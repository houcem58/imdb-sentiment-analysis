name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  check-clean-outputs:
    name: Notebook outputs clean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install nbformat
        run: pip install nbformat

      - name: Fail if notebook has uncommitted outputs or execution counts
        run: |
          python - << 'EOF'
          import nbformat, sys
          nb = nbformat.read("imdb_sentiment_analysis.ipynb", as_version=4)
          dirty = [
              i for i, c in enumerate(nb.cells)
              if c.cell_type == "code"
              and (c.get("outputs") or c.get("execution_count") is not None)
          ]
          if dirty:
              print(f"Cells with stale outputs/execution_count at indices: {dirty}")
              print("Run nbstripout before committing.")
              sys.exit(1)
          print(f"OK all {len(nb.cells)} cells are clean")
          EOF

  validate-notebook:
    name: Validate notebook structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install nbformat
        run: pip install nbformat

      - name: Validate notebook format and required sections
        run: |
          python - << 'EOF'
          import nbformat, sys

          nb = nbformat.read("imdb_sentiment_analysis.ipynb", as_version=4)
          nbformat.validate(nb)

          all_source = "\n".join("".join(c.source) for c in nb.cells)
          required = [
              "Configuration",
              "Data Collection",
              "Text Preprocessing",
              "Sentiment Labelling",
              "Class Balancing",
              "Classical Models",
              "Deep Learning",
              "BERT Fine-tuning",
              "Results Summary",
              "Inference Function",
          ]
          missing = [s for s in required if s not in all_source]
          if missing:
              print(f"Missing sections: {missing}")
              sys.exit(1)

          print(f"OK  {len(nb.cells)} cells validated")
          EOF

  requirements-check:
    name: Requirements sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check requirements can be resolved
        run: pip install --dry-run -r requirements.txt 2>&1 | tail -5
